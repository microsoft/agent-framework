name: agent-framework-hosting-sample
description: >
  Minimal Agent Framework multi-channel hosting sample (Responses + Invocations)
  packaged for the Foundry Hosted Agents runtime. Demonstrates that an
  ``AgentFrameworkHost`` configured with the Responses and Invocations channels
  under their default mounts is a drop-in Hosted Agent image (per ADR 0026 §11)
  — no protocol shim, no Foundry-specific server.
metadata:
  tags:
    - Agent Framework
    - AI Agent Hosting
    - Azure AI AgentServer
    - Responses Protocol
    - Invocations Protocol
    - Streaming
    - Multi-Channel
template:
  name: agent-framework-hosting-sample
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
    - protocol: invocations
      version: 1.0.0
  environment_variables:
    - name: MODEL_DEPLOYMENT_NAME
      value: "{{MODEL_DEPLOYMENT_NAME}}"
resources:
  - kind: model
    id: gpt-5.4-nano
    name: MODEL_DEPLOYMENT_NAME
