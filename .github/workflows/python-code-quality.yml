name: Python - Code Quality
on:
  merge_group:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
    paths:
      - "python/**"
      - "!python/AGENTS.md"
      - "!python/**/AGENTS.md"
      - "!python/.github/skills/*"
      - "!python/.github/skills/**"

env:
  # Configure a constant location for the uv cache
  UV_CACHE_DIR: /tmp/.uv-cache

jobs:
  pre-commit-hooks:
    name: Pre-commit Hooks
    if: "!cancelled()"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: ./python
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Set up python and install the project
        id: python-setup
        uses: ./.github/actions/python-setup
        with:
          python-version: ${{ matrix.python-version }}
          os: ${{ runner.os }}
        env:
          UV_CACHE_DIR: /tmp/.uv-cache
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/prek
          key: prek|${{ matrix.python-version }}|${{ hashFiles('python/.pre-commit-config.yaml') }}
      - uses: j178/prek-action@0bb87d7f00b0c99306c8bcb8b8beba1eb581c037 # v1
        name: Run Pre-commit Hooks (excluding poe-check)
        env:
          SKIP: poe-check
        with:
          extra-args: --cd python --all-files

  package-checks:
    name: Package Checks
    if: "!cancelled()"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: ./python
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Set up python and install the project
        id: python-setup
        uses: ./.github/actions/python-setup
        with:
          python-version: ${{ matrix.python-version }}
          os: ${{ runner.os }}
        env:
          UV_CACHE_DIR: /tmp/.uv-cache
      - name: Run syntax and pyright across packages
        run: uv run poe check-packages

  samples-markdown:
    name: Samples & Markdown
    if: "!cancelled()"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: ./python
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Set up python and install the project
        id: python-setup
        uses: ./.github/actions/python-setup
        with:
          python-version: ${{ matrix.python-version }}
          os: ${{ runner.os }}
        env:
          UV_CACHE_DIR: /tmp/.uv-cache
      - name: Run samples checks
        run: uv run poe check -S
      - name: Run markdown code lint
        run: uv run poe markdown-code-lint

  test-typing:
    name: Test Typing Checks
    if: "!cancelled()"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: ./python
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Set up python and install the project
        id: python-setup
        uses: ./.github/actions/python-setup
        with:
          python-version: ${{ matrix.python-version }}
          os: ${{ runner.os }}
        env:
          UV_CACHE_DIR: /tmp/.uv-cache
      - name: Run tests/samples type checkers (mypy, pyrefly, ty)
        run: uv run python scripts/workspace_poe_tasks.py ci-test-typing

  dependency-bounds:
    name: Dependency Bounds Validation
    if: "!cancelled()"
    runs-on: ubuntu-latest
    # Match the Python dependency maintenance workflow so PR results line up with the
    # nightly/dispatch sweep. Reevaluate if package installability starts differing
    # across supported Python versions.
    timeout-minutes: 60
    defaults:
      run:
        working-directory: ./python
    env:
      UV_PYTHON: "3.13"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # The upper-bound resolver builds the internal workspace graph, so fetch full
          # history to mirror the dependency maintenance workflow.
          fetch-depth: 0
      - name: Set up python and install the project
        id: python-setup
        uses: ./.github/actions/python-setup
        with:
          python-version: ${{ env.UV_PYTHON }}
          os: ${{ runner.os }}
        env:
          UV_CACHE_DIR: /tmp/.uv-cache
      # Pin the dependency release cutoff to the same 7-day window the dependency
      # maintenance workflow uses, so this PR check resolves the same upstream
      # releases as the weekly sweep instead of pulling in newer ones and diverging.
      - name: Set dependency release cutoff
        run: |
          cutoff="$(date -u -d '7 days ago' '+%Y-%m-%dT%H:%M:%SZ')"
          echo "UV_EXCLUDE_NEWER=${cutoff}" >> "$GITHUB_ENV"
          echo "Using dependency release cutoff: ${cutoff}"
      # Smoke both ends of every package's allowed dependency range (lowest-direct and
      # highest) and run each package's pyright pass in an isolated environment. This
      # catches floor-too-low, missing-optional-dependency, and isolated-env typing
      # regressions that the full-workspace test and typing jobs do not.
      - name: Validate dependency bounds (lower + upper)
        run: uv run poe validate-dependency-bounds-test --package "*"
      - name: Upload dependency bounds report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dependency-bounds-test-results
          path: python/scripts/dependencies/dependency-bounds-test-results.json
          if-no-files-found: warn
